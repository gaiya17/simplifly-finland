# ============================================================
#  CI Pipeline — Runs on EVERY Pull Request
#  
#  WHAT THIS DOES: When you open a Pull Request on GitHub,
#  this robot automatically checks your code for errors.
#  If the check fails, you can NOT merge until you fix it.
#  Think of it as a code quality guard. 🛡️
# ============================================================

name: 🔍 CI — Lint & Type Check

on:
  pull_request:
    branches: [main, develop]   # Run on PRs targeting these branches
  push:
    branches: [develop]         # Also run when pushing to develop

jobs:
  # ─── JOB 1: Check the Backend Code ─────────────────────────
  backend-ci:
    name: 🔧 Backend — TypeScript & Lint
    runs-on: ubuntu-latest      # GitHub gives us a free Ubuntu computer

    steps:
      - name: 📥 Download your code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci              # "ci" is faster than "install" in automation

      - name: 🔍 TypeScript type check
        working-directory: backend
        run: npm run type-check  # Checks for TypeScript errors

      - name: 🧹 Lint check
        working-directory: backend
        run: npm run lint        # Checks code style rules

  # ─── JOB 2: Check the Frontend Code ────────────────────────
  frontend-ci:
    name: ⚛️ Frontend — TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download your code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: 🧹 Lint check
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build check
        working-directory: frontend
        run: npm run build       # Make sure the app actually builds
        env:
          # Dummy values for build — real values only on the server
          NEXT_PUBLIC_API_URL: http://localhost:5000
