# ============================================================
#  CD Pipeline — Deploys to Production Automatically
#
#  WHAT THIS DOES: When code is merged into "main" branch,
#  this robot wakes up, builds your Docker containers,
#  SSHs into your Hostinger server, and restarts everything.
#
#  YOU do: git push → create PR → merge to main
#  ROBOT does: everything else (build, test, deploy) 🤖
# ============================================================

name: 🚀 CD — Deploy to Production

on:
  push:
    branches: [main]    # ONLY triggers when code lands in "main"

jobs:
  deploy:
    name: 🌐 Deploy to Hostinger VPS
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Get the latest code ─────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Verify the app builds before deploying ──────
      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Verify backend builds
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: 🏗️ Verify frontend builds
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://simpliflyfinland.fi/api

      # ── Step 3: SSH into your server and deploy ─────────────
      # Think of this as: robot opens your server with the key,
      # types commands, and logs out. Just like you would.
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}          # Your server's IP address
          username: ${{ secrets.VPS_USER }}      # "deploy" user we created
          key: ${{ secrets.VPS_SSH_KEY }}        # The private SSH key
          script: |
            echo "🔄 Pulling latest code..."
            cd /opt/simplifly
            git pull origin main
            
            echo "📝 Writing environment variables..."
            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=https://simpliflyfinland.fi/api
            EOF
            
            echo "🐳 Building Docker containers..."
            docker compose build --no-cache
            
            echo "🔄 Restarting containers (zero downtime)..."
            docker compose up -d --no-deps --remove-orphans
            
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"

      # ── Step 4: Verify deployment worked ────────────────────
      - name: ✅ Health Check
        run: |
          sleep 30  # Wait 30 seconds for containers to start
          curl --fail https://simpliflyfinland.fi/api/health || exit 1
          echo "🎉 Site is live and healthy!"

      # ── Step 5: Notify on failure ───────────────────────────
      - name: ❌ Notify on Failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above."
          # You can add Slack/email notification here later
