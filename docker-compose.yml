version: '3.8'
services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
