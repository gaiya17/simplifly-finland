# ============================================================
#  nginx.conf — Reverse Proxy Configuration
#
#  WHAT IS NGINX? It's the "receptionist" of your server.
#  When someone visits simpliflyfinland.fi, nginx decides:
#
#  /api/*  → Send to backend Express server (port 5000)
#  /*      → Send to frontend Next.js server (port 3000)
#
#  It also handles:
#  - HTTP → HTTPS redirect (security!)
#  - File upload size limits
#  - Request timeouts
# ============================================================

# How many worker processes to use (auto = match CPU cores)
worker_processes auto;

events {
    worker_connections 1024;    # Max simultaneous connections per worker
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;    # Max upload size (for image uploads in admin)
    gzip on;                     # Compress responses (faster page loads)
    gzip_types text/plain text/css application/json application/javascript;

    # ── Rate limiting zones ──────────────────────────────────
    # Limits requests to the API to prevent abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── REDIRECT HTTP → HTTPS ────────────────────────────────
    # Anyone visiting http://simpliflyfinland.fi gets redirected
    # to https://simpliflyfinland.fi automatically
    server {
        listen 80;
        server_name simpliflyfinland.fi www.simpliflyfinland.fi;

        # Let's Encrypt certificate renewal (ignore this for now)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── MAIN HTTPS SERVER ────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name simpliflyfinland.fi www.simpliflyfinland.fi;

        # SSL Certificate files (from Cloudflare or Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings (TLS 1.2 and 1.3 only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # ── API Routes → Express Backend ────────────────────
        # Any URL starting with /api goes to the Node.js server
        location /api/ {
            limit_req zone=api burst=20 nodelay;    # Rate limit API

            proxy_pass http://backend:5000;         # Send to Express container
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── Everything Else → Next.js Frontend ──────────────
        location / {
            proxy_pass http://frontend:3000;        # Send to Next.js container
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
